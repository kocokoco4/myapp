<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>曲帳</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#0b0a08;--bg2:#131210;--bg3:#1a1815;--bg4:#222018;
  --border:#2c2820;--border2:#3a3628;
  --text:#ede8dd;--text2:#8a8070;--text3:#4a4540;
  --amber:#e8a020;--amber2:#f0b840;
  --teal:#1eb8a0;--coral:#e05050;--green:#50c878;--purple:#9060e8;
  --font:'Noto Sans JP',sans-serif;--mono:'Space Mono',monospace;--disp:'Syne',sans-serif;
  --sb:230px;--nav:62px;--r:10px;--rl:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
#app{display:flex;height:100vh}
#sidebar{width:var(--sb);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:11px 14px;padding-top:calc(11px + env(safe-area-inset-top,0px));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2);flex-shrink:0}
.title-in{background:none;border:none;color:var(--text);font-family:var(--disp);font-size:16px;font-weight:700;flex:1;outline:none;min-width:0}
.tabs-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;overflow-x:auto}
.tabs-bar::-webkit-scrollbar{height:0}
.tbtn{padding:10px 13px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:11px;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;font-family:var(--font)}
.tbtn.active{color:var(--amber);border-bottom-color:var(--amber);font-weight:700}
.tab-c{flex:1;overflow-y:auto;padding:16px}
#bnav{display:none;height:calc(var(--nav) + env(safe-area-inset-bottom,0px));background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom,0px)}
.bnb{background:none;border:none;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;font-family:var(--font);transition:color .15s;padding:5px 2px}
.bnb.active{color:var(--amber)}
.bnb-ic{font-size:18px;line-height:1}
.sb-hd{padding:18px 14px 12px;padding-top:calc(18px + env(safe-area-inset-top,0px));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-logo{font-family:var(--disp);font-size:17px;font-weight:800;color:var(--amber)}
.sb-logo small{color:var(--text2);font-weight:400;font-size:12px;display:block;margin-top:-2px}
.sb-new{width:calc(100% - 20px);margin:10px;padding:9px;background:var(--amber);border:none;border-radius:var(--r);color:var(--bg);font-weight:700;font-size:12px;cursor:pointer;font-family:var(--font)}
.sb-new:hover{background:var(--amber2)}
.sb-list{flex:1;overflow-y:auto;padding:4px 8px}
.si{padding:9px 10px;border-radius:var(--r);cursor:pointer;transition:background .1s;position:relative;margin-bottom:2px;border:1px solid transparent}
.si:hover{background:var(--bg3)}
.si.active{background:var(--bg4);border-color:var(--border2)}
.si .sn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2);margin-bottom:3px}
.si.active .sn{color:var(--text)}
.si .stag{font-size:9px;padding:1px 5px;border-radius:10px;font-weight:700;font-family:var(--mono);display:inline-block}
.si .sdel{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;opacity:0;padding:3px}
.si:hover .sdel{opacity:1}
.status-wr{position:relative;flex-shrink:0}
.spill{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;font-family:var(--mono);white-space:nowrap}
.sdrop{position:absolute;right:0;top:calc(100%+5px);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);z-index:300;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.6);min-width:95px;display:none}
.sdrop.open{display:block}
.sopt{padding:7px 14px;cursor:pointer;font-size:11px;font-weight:700;font-family:var(--mono)}
.sopt:hover{background:var(--bg4)}
.flbl{font-size:10px;color:var(--text2);font-weight:700;display:block;margin-bottom:5px;font-family:var(--mono);letter-spacing:.5px}
.inp{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:7px 10px;font-size:13px;outline:none;font-family:var(--font)}
.inp:focus{border-color:var(--amber)}
/* ★ テキストエリアはDOM再描画なしで動作 */
.txa{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:12px;font-size:16px;line-height:2;resize:none;outline:none;width:100%;font-family:var(--font)}
.txa:focus{border-color:var(--amber)}
.btn{padding:8px 15px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--font)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-a{background:var(--amber);color:var(--bg)}
.btn-a:hover:not(:disabled){background:var(--amber2)}
.btn-g{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-g:hover:not(:disabled){border-color:var(--amber);color:var(--amber)}
.btn-t{background:var(--teal);color:var(--bg)}
.sec-wr{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:12px;margin-bottom:12px}
.sni{background:none;border:none;color:var(--amber);font-weight:700;font-size:13px;outline:none;font-family:var(--disp);flex:1}
.cg{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.cc{width:62px;height:50px;border-radius:9px;border:1px solid var(--border2);background:var(--bg4);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;user-select:none;-webkit-user-select:none}
.cc:active{transform:scale(.95)}
.cc.has{border-color:var(--amber);background:rgba(232,160,32,.08)}
.cc.play{border-color:var(--teal)!important;background:rgba(30,184,160,.15)!important}
.cc .bn{font-size:8px;color:var(--text3);position:absolute;top:3px;left:5px;font-family:var(--mono)}
.cc .cn{font-size:12px;font-weight:700;color:var(--text3);font-family:var(--mono)}
.cc.has .cn{color:var(--amber)}
.cpk{position:absolute;top:calc(100%+5px);left:0;z-index:400;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:10px;width:250px;box-shadow:0 16px 48px rgba(0,0,0,.7)}
.cpr{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:3px}
.cpb{padding:3px 6px;border-radius:5px;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);font-size:10px;cursor:pointer;font-family:var(--mono)}
.cpb:hover,.cpb.a{background:rgba(232,160,32,.15);border-color:var(--amber);color:var(--amber)}
.qr{display:flex;gap:4px;flex-wrap:wrap}
.qb{font-size:10px;padding:3px 8px;background:var(--bg4);border:1px solid var(--border2);border-radius:20px;color:var(--text2);cursor:pointer;font-family:var(--font)}
.qb:hover{border-color:var(--teal);color:var(--teal)}
.isel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.ibtn{padding:5px 13px;border-radius:20px;border:1px solid;background:transparent;font-size:11px;cursor:pointer;font-family:var(--mono);font-weight:700}
/* Staff */
.staff-block{background:#fff;border-radius:var(--rl);padding:14px;overflow-x:auto;margin-bottom:14px}
.staff-sec-lbl{font-size:10px;font-weight:700;color:#7c3aed;font-family:monospace;letter-spacing:.5px;margin-bottom:7px;padding:2px 8px;background:#f3eeff;border-radius:4px;display:inline-block}
.staff-part-lbl{font-size:11px;font-weight:700;font-family:monospace;margin-bottom:6px;margin-top:14px}
.staff-part-lbl:first-child{margin-top:0}
/* Melody input */
.mel-sec{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:14px}
.mel-sec-name{background:none;border:none;color:var(--amber);font-weight:700;font-size:13px;outline:none;font-family:var(--disp);margin-bottom:10px;display:block;width:100%}
.mel-measures{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.mel-meas{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:8px;min-width:90px}
.mel-meas-chord{font-size:10px;font-weight:700;color:var(--amber);font-family:var(--mono);margin-bottom:6px}
.mel-notes{display:flex;gap:4px;flex-wrap:wrap}
.mel-note-chip{padding:3px 7px;border-radius:5px;background:rgba(30,184,160,.15);border:1px solid var(--teal);color:var(--teal);font-size:11px;font-family:var(--mono);cursor:pointer;display:flex;align-items:center;gap:4px}
.mel-note-chip .del{color:rgba(30,184,160,.5);font-size:10px}
.add-note-btn{padding:4px 9px;border-radius:5px;background:transparent;border:1px dashed var(--border2);color:var(--text3);font-size:11px;cursor:pointer;font-family:var(--mono)}
.add-note-btn:hover{border-color:var(--teal);color:var(--teal)}
/* Note picker popup */
.npk{position:fixed;z-index:500;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:12px;box-shadow:0 16px 48px rgba(0,0,0,.8);width:280px}
.npk-row{display:flex;gap:4px;align-items:center;margin-bottom:8px}
.npk-lbl{font-size:10px;color:var(--text2);font-family:var(--mono);width:50px;flex-shrink:0}
.npk-note{padding:4px 7px;border-radius:5px;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);font-size:11px;cursor:pointer;font-family:var(--mono)}
.npk-note:hover,.npk-note.sel{background:rgba(30,184,160,.15);border-color:var(--teal);color:var(--teal)}
.npk-note.sharp{color:var(--text3);font-size:9px}
.npk-note.scale{background:rgba(30,184,160,.12);border-color:rgba(30,184,160,.5)}
.dur-row{display:flex;gap:4px;flex-wrap:wrap}
.dur-btn{padding:4px 9px;border-radius:5px;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);font-size:10px;cursor:pointer;font-family:var(--mono)}
.dur-btn:hover,.dur-btn.sel{background:rgba(232,160,32,.15);border-color:var(--amber);color:var(--amber)}
/* Score / Chat */
.sc-wr{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.sc-ti{font-family:var(--disp);font-size:22px;font-weight:800;color:var(--text);margin-bottom:3px}
.sc-meta{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:18px}
.sc-sn{font-size:11px;font-weight:700;color:var(--amber);font-family:var(--mono);margin-bottom:7px;display:flex;align-items:center;gap:8px}
.sc-sn::after{content:'';flex:1;height:1px;background:var(--border)}
.sc-ch{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:7px 11px;font-size:15px;font-weight:700;font-family:var(--mono);color:var(--text3);min-width:52px;text-align:center}
.sc-ch.has{border-color:rgba(232,160,32,.4);color:var(--amber)}
.chat-wr{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:10px}
.mb{max-width:84%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.7}
.mb-u{align-self:flex-end;background:var(--amber);color:var(--bg);border-bottom-right-radius:3px;font-weight:500}
.mb-a{align-self:flex-start;background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-bottom-left-radius:3px}
.chat-iw{flex-shrink:0;padding-top:10px;border-top:1px solid var(--border)}
.sugg{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.sg{font-size:10px;padding:4px 9px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;color:var(--text2);cursor:pointer;white-space:nowrap}
.sg:hover{border-color:var(--amber);color:var(--amber)}
.chat-row{display:flex;gap:8px}
.chat-in{flex:1;background:var(--bg4);border:1px solid var(--border2);border-radius:24px;color:var(--text);padding:10px 16px;font-size:16px;outline:none;font-family:var(--font)}
.chat-in:focus{border-color:var(--amber)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg3);border:1px solid var(--amber);border-radius:10px;padding:10px 18px;font-size:12px;color:var(--amber);z-index:9998;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;font-family:var(--mono)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:769px){#toast{bottom:22px}}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .2s ease}
@media(max-width:768px){
  #sidebar{
    position:fixed;top:0;left:0;height:100vh;z-index:800;
    transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow:4px 0 24px rgba(0,0,0,.6);
  }
  #sidebar.open{transform:translateX(0)}
  #sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:799}
  #sb-overlay.open{display:block}
  #bnav{display:grid!important}
  .tab-c{padding:12px;padding-bottom:calc(var(--nav)+env(safe-area-inset-bottom,0px)+16px)}
  .topbar{padding:9px 12px}
  .tabs-bar{display:none}
  #main{height:100vh}
}
@media(min-width:769px){
  #bnav{display:none!important}
  #sb-overlay{display:none!important}
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sb-hd">
      <div class="sb-logo">曲帳<small>songbook</small></div>
      <button class="btn btn-g" style="margin-left:auto;padding:3px 7px;font-size:11px" onclick="toggleSB()">✕</button>
    </div>
    <button class="sb-new" onclick="addSong()">＋ 新しい曲</button>
    <div id="syncBar"></div>
    <div class="sb-list" id="songList"></div>
  </div>
  <div id="main">
    <div class="topbar" id="topbar">
      <button class="btn btn-g" style="padding:5px 7px;font-size:15px;flex-shrink:0" onclick="toggleSB()">
        <svg width="16" height="13" viewBox="0 0 16 13" fill="currentColor"><rect y="0" width="16" height="1.8" rx="1"/><rect y="5.6" width="12" height="1.8" rx="1"/><rect y="11.2" width="16" height="1.8" rx="1"/></svg>
      </button>
      <input class="title-in" id="titleIn" placeholder="曲タイトル" oninput="onTitleChange(this.value)">
      <div class="status-wr"><button class="spill" id="stBtn" onclick="toggleSDrop()"></button><div class="sdrop" id="stDrop"></div></div>
    </div>
    <div class="tabs-bar" id="tabsBar"></div>
    <div class="tab-c" id="tabC"></div>
    <div id="bnav">
      <button class="bnb" data-tab="lyrics" onclick="switchTab('lyrics')"><span class="bnb-ic">✏️</span>歌詞</button>
      <button class="bnb" data-tab="melody" onclick="switchTab('melody')"><span class="bnb-ic">🎵</span>メロ</button>
      <button class="bnb" data-tab="chords" onclick="switchTab('chords')"><span class="bnb-ic">🎸</span>コード</button>
      <button class="bnb" data-tab="accomp" onclick="switchTab('accomp')"><span class="bnb-ic">🎼</span>伴奏</button>
      <button class="bnb" data-tab="ai" onclick="switchTab('ai')"><span class="bnb-ic">✦</span>AI</button>
    </div>
    <div class="empty" id="emptyS" style="display:none">
      <div style="font-size:44px;opacity:.3">🎵</div>
      <div style="font-size:13px;font-weight:600;color:var(--text2)">まだ曲がありません</div>
      <button class="btn btn-a" onclick="addSong()">最初の曲を作る</button>
    </div>
  </div>
</div>
<div id="sb-overlay" onclick="closeSB()"></div>
<div id="toast"></div>
<!-- Note picker popup (shared) -->
<div id="npk" class="npk" style="display:none"></div>
<!-- Settings modal -->
<div id="settingsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:20px;width:min(460px,100%);max-height:90vh;overflow-y:auto" id="settingsContent"></div>
</div>

<script>
/* ─── CONSTANTS ─── */
const KEYS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const STATS=['アイデア','作詞中','作曲中','録音中','完成'];
const STC={アイデア:'#64748b',作詞中:'#3b82f6',作曲中:'#9060e8',録音中:'#e8a020',完成:'#50c878'};
const DSECS=['イントロ','Aメロ','Bメロ','サビ','アウトロ'];
const CL=[['C','CM7','C7','Cm','Cm7','Cadd9'],['D','DM7','D7','Dm','Dm7','D/F#'],['E','EM7','E7','Em','Em7'],['F','FM7','F7','Fm','Fm7','F/A'],['G','GM7','G7','Gm','Gm7','G/B'],['A','AM7','A7','Am','Am7','A/C#'],['B','BM7','B7','Bm','Bm7'],['F#','F#m','Bb','Eb','Ab','Db']];
const QP=[{l:'王道進行',c:['C','G','Am','F']},{l:'小室進行',c:['Am','F','G','C']},{l:'カノン',c:['C','G','Am','Em','F','C','F','G']},{l:'暗い系',c:['Am','G','F','E']},{l:'4-5-3-6',c:['F','G','Em','Am']}];
const INSTRS={piano:{label:'ピアノ',color:'#9060e8'},bass:{label:'ベース',color:'#3b82f6'},guitar:{label:'ギター',color:'#e8a020'},drums:{label:'ドラム',color:'#e05050'}};
const NOTE_NAMES_JP=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const OCTAVES=[3,4,5];
const DURS=[{v:'w',l:'全音符',b:4},{v:'h',l:'2分',b:2},{v:'q',l:'4分',b:1},{v:'8',l:'8分',b:.5},{v:'16',l:'16分',b:.25}];
const DB={w:4,h:2,q:1,'8':0.5,'16':0.25};
const MAJOR_SCALE=[0,2,4,5,7,9,11];
function getScaleNotes(key){const ri=NN.indexOf(key);if(ri<0)return NN;return MAJOR_SCALE.map(i=>NN[(ri+i)%12]);}
const gid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ─── WEB AUDIO ─── */
const NF={'C2':65.4,'C#2':69.3,'D2':73.4,'D#2':77.8,'E2':82.4,'F2':87.3,'F#2':92.5,'G2':98,'A2':110,'B2':123.5,'C3':130.8,'C#3':138.6,'D3':146.8,'D#3':155.6,'E3':164.8,'F3':174.6,'F#3':185,'G3':196,'A3':220,'B3':246.9,'C4':261.6,'C#4':277.2,'D4':293.7,'D#4':311.1,'E4':329.6,'F4':349.2,'F#4':370,'G4':392,'A4':440,'B4':493.9,'C5':523.3,'D5':587.3,'E5':659.3,'G5':784};
const CI={'':[ 0,4,7],'M7':[0,4,7,11],'7':[0,4,7,10],'m':[0,3,7],'m7':[0,3,7,10],'add9':[0,4,7,14],'sus4':[0,5,7]};
const NN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let actx=null;
function parseChord(name){if(!name)return[];const sl=name.indexOf('/');const base=sl>0?name.slice(0,sl):name;const m=base.match(/^([A-G]#?)(.*)$/);if(!m)return[];const ri=NN.indexOf(m[1]);if(ri<0)return[];const ivs=CI[m[2]]||CI[''];return ivs.map(i=>{const ni=(ri+i)%12;const o=3+Math.floor((ri+i)/12);return NN[ni]+o;});}
function playChord(name,el){
  if(!name)return;if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();
  const notes=parseChord(name);if(!notes.length)return;
  if(el){el.classList.add('play');setTimeout(()=>el.classList.remove('play'),600);}
  const now=actx.currentTime;
  notes.forEach(n=>{const freq=NF[n];if(!freq)return;const osc=actx.createOscillator(),gain=actx.createGain(),filt=actx.createBiquadFilter();osc.type='triangle';osc.frequency.value=freq;filt.type='lowpass';filt.frequency.value=2200;gain.gain.setValueAtTime(0,now);gain.gain.linearRampToValueAtTime(0.12,now+0.02);gain.gain.exponentialRampToValueAtTime(0.001,now+1.2);osc.connect(filt);filt.connect(gain);gain.connect(actx.destination);osc.start(now);osc.stop(now+1.2);});
}
function playNote(pitch){
  if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();
  const freq=NF[pitch];if(!freq)return;
  const now=actx.currentTime;const osc=actx.createOscillator(),gain=actx.createGain();
  osc.type='sine';osc.frequency.value=freq;gain.gain.setValueAtTime(0,now);gain.gain.linearRampToValueAtTime(0.2,now+0.01);gain.gain.exponentialRampToValueAtTime(0.001,now+0.8);
  osc.connect(gain);gain.connect(actx.destination);osc.start(now);osc.stop(now+0.8);
}

/* ─── STAFF RENDERER ─── */
const SS=8,SH=4;
const DI={C:0,D:1,E:2,F:3,G:4,A:5,B:6};
function pitchPos(pitch,clef){const m=(pitch||'').match(/^([A-G])(#|b)?(\d)$/);if(!m)return 4;const o=parseInt(m[3]);if(clef==='bass')return(o-2)*7+(DI[m[1]]-DI['G']);return(o-4)*7+(DI[m[1]]-DI['E']);}
function pY(pos,sb){return sb-pos*SH;}
function sLine(x1,y1,x2,y2,c='#333',w=0.8){return`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="${w}"/>`;}
function staveLines(x,top,w){let s='';for(let i=0;i<=4;i++)s+=sLine(x,top+i*SS,x+w,top+i*SS);return s;}
function ledger(cx,pos,sb){let s='';const lw=13;if(pos<=-1){const from=pos%2===0?pos:pos-1;for(let p=from;p<0;p+=2)s+=sLine(cx-lw/2,pY(p,sb),cx+lw/2,pY(p,sb),'#555',0.9);}if(pos>=9){for(let p=10;p<=pos+(pos%2===0?0:1);p+=2)s+=sLine(cx-lw/2,pY(p,sb),cx+lw/2,pY(p,sb),'#555',0.9);}return s;}
function drawNoteHead(cx,pos,dur,color,sb){
  const y=pY(pos,sb);const filled=dur!=='w'&&dur!=='h';let s=ledger(cx,pos,sb);
  if(dur==='w')s+=`<ellipse cx="${cx}" cy="${y}" rx="5.5" ry="4" fill="none" stroke="${color}" stroke-width="1.6" transform="rotate(-10,${cx},${y})"/>`;
  else if(!filled)s+=`<ellipse cx="${cx}" cy="${y}" rx="5" ry="3.8" fill="white" stroke="${color}" stroke-width="1.5" transform="rotate(-10,${cx},${y})"/>`;
  else s+=`<ellipse cx="${cx}" cy="${y}" rx="5" ry="3.8" fill="${color}" transform="rotate(-10,${cx},${y})"/>`;
  if(dur!=='w'){const up=pos<4;const sx=up?cx+5:cx-5;const sy1=y+(up?-1:1);const sy2=y+(up?-26:26);s+=sLine(sx,sy1,sx,sy2,color,1.2);
    if(dur==='8')s+=up?`<path d="M ${sx} ${sy2} q 10 5 5 16" stroke="${color}" fill="none" stroke-width="1.2"/>`:`<path d="M ${sx} ${sy2} q 10 -5 5 -16" stroke="${color}" fill="none" stroke-width="1.2"/>`;
    if(dur==='16')s+=up?`<path d="M ${sx} ${sy2} q 10 5 5 14" stroke="${color}" fill="none" stroke-width="1.2"/><path d="M ${sx} ${sy2+7} q 10 5 5 14" stroke="${color}" fill="none" stroke-width="1.2"/>`:`<path d="M ${sx} ${sy2} q 10 -5 5 -14" stroke="${color}" fill="none" stroke-width="1.2"/><path d="M ${sx} ${sy2-7} q 10 -5 5 -14" stroke="${color}" fill="none" stroke-width="1.2"/>`;
  }
  return s;
}
function drawAccidental(cx,pos,acc,color,sb){if(!acc)return'';const y=pY(pos,sb);return`<text x="${cx-13}" y="${y+4}" font-size="10" fill="${color}" text-anchor="middle" font-family="serif">${acc==='#'?'♯':'♭'}</text>`;}
function drawRest(cx,dur,sb){const mid=pY(4,sb);if(dur==='w')return`<rect x="${cx-6}" y="${pY(6,sb)}" width="12" height="5" fill="#555" rx="1"/>`;if(dur==='h')return`<rect x="${cx-6}" y="${pY(4,sb)-5}" width="12" height="5" fill="#555" rx="1"/>`;if(dur==='q')return`<path d="M ${cx} ${mid-14} q 5 3 0 8 q -7 3 -2 9 q 5 3 2 9" stroke="#555" fill="none" stroke-width="1.5"/>`;return`<path d="M ${cx} ${mid-6} q 7 0 2 10" stroke="#555" fill="none" stroke-width="1.5"/><circle cx="${cx+2}" cy="${mid+4}" r="2.5" fill="#555"/>`;}
function drawNoteHeadOnly(cx,pos,dur,color,sb){
const y=pY(pos,sb);const filled=dur!=='w'&&dur!=='h';let s=ledger(cx,pos,sb);
if(dur==='w')s+=`<ellipse cx="${cx}" cy="${y}" rx="5.5" ry="4" fill="none" stroke="${color}" stroke-width="1.6" transform="rotate(-10,${cx},${y})"/>`;
else if(!filled)s+=`<ellipse cx="${cx}" cy="${y}" rx="5" ry="3.8" fill="white" stroke="${color}" stroke-width="1.5" transform="rotate(-10,${cx},${y})"/>`;
else s+=`<ellipse cx="${cx}" cy="${y}" rx="5" ry="3.8" fill="${color}" transform="rotate(-10,${cx},${y})"/>`;
return s;}
function drawBeamGroup(group,clef,mx,bw,sb,color){
if(group.length<2)return'';let s='';
const realNotes=group.filter(n=>n.pitch!=='R');
if(realNotes.length<2)return'';
const positions=group.map(n=>n.pitch==='R'?4:pitchPos(n.pitch,clef));
const avgPos=positions.reduce((a,b)=>a+b,0)/positions.length;
const up=avgPos<4;
const noteData=group.map((n,i)=>{
const cx=mx+(n.startBeat||0)*bw+bw*0.55;
const pos=positions[i];const y=pY(pos,sb);
const sx=up?cx+5:cx-5;
return{cx,pos,y,sx,dur:n.duration,isRest:n.pitch==='R'};});
const extremeY=up?Math.min(...noteData.filter(d=>!d.isRest).map(d=>d.y)):Math.max(...noteData.filter(d=>!d.isRest).map(d=>d.y));
const beamY=up?extremeY-26:extremeY+26;
for(const d of noteData){if(d.isRest)continue;const sy1=d.y+(up?-1:1);s+=sLine(d.sx,sy1,d.sx,beamY,color,1.2);}
const firstN=noteData.find(d=>!d.isRest);const lastN=[...noteData].reverse().find(d=>!d.isRest);
if(firstN&&lastN){const bx=Math.min(firstN.sx,lastN.sx);const bw2=Math.abs(lastN.sx-firstN.sx)||1;
s+=`<rect x="${bx}" y="${beamY-(up?3:0)}" width="${bw2}" height="3" fill="${color}" rx="0.5"/>`;}
const beamY2=up?beamY+7:beamY-7;let bi=0;
while(bi<noteData.length){
if(noteData[bi].dur==='16'&&!noteData[bi].isRest){let bj=bi;while(bj<noteData.length&&noteData[bj].dur==='16')bj++;
const seg=noteData.slice(bi,bj).filter(d=>!d.isRest);
if(seg.length>=2){const f16=seg[0];const l16=seg[seg.length-1];s+=`<rect x="${Math.min(f16.sx,l16.sx)}" y="${beamY2-(up?3:0)}" width="${Math.abs(l16.sx-f16.sx)||1}" height="3" fill="${color}" rx="0.5"/>`;}
else if(seg.length===1){const d=seg[0];const sd=bi>0?-1:1;s+=`<rect x="${d.sx+(sd<0?-8:0)}" y="${beamY2-(up?3:0)}" width="8" height="3" fill="${color}" rx="0.5"/>`;}
bi=bj;}else{bi++;}}
return s;}
function renderNotes(notes,clef,mx,mw,sb,color){let s='';if(!notes||!notes.length){s+=drawRest(mx+mw/2,'w',sb);return s;}
const bw=mw/4;const sorted=[...notes].filter(n=>n?.pitch).sort((a,b)=>(a.startBeat||0)-(b.startBeat||0));
const beamGroups=[];let curGrp=[];
for(const n of sorted){const isB=n.duration==='8'||n.duration==='16';
if(isB){const beat=Math.floor(n.startBeat||0);
if(curGrp.length>0){const lastBeat=Math.floor(curGrp[curGrp.length-1].startBeat||0);
if(beat===lastBeat){curGrp.push(n);}else{if(curGrp.filter(x=>x.pitch!=='R').length>=2)beamGroups.push([...curGrp]);curGrp=[n];}}
else{curGrp.push(n);}}
else{if(curGrp.filter(x=>x.pitch!=='R').length>=2)beamGroups.push([...curGrp]);curGrp=[];}}
if(curGrp.filter(x=>x.pitch!=='R').length>=2)beamGroups.push([...curGrp]);
const beamedSet=new Set();for(const g of beamGroups)for(const n of g)beamedSet.add(n);
for(const n of sorted){const isR=n.pitch==='R';const cx=mx+(n.startBeat||0)*bw+bw*0.55;
if(isR){s+=drawRest(cx,n.duration||'q',sb);continue;}
const m=n.pitch.match(/^([A-G])(#|b)?(\d)$/);if(!m)continue;const pos=pitchPos(n.pitch,clef);
if(beamedSet.has(n)){s+=drawNoteHeadOnly(cx,pos,n.duration||'q',color,sb);}
else{s+=drawNoteHead(cx,pos,n.duration||'q',color,sb);}
s+=drawAccidental(cx,pos,m[2]||null,color,sb);}
for(const g of beamGroups)s+=drawBeamGroup(g,clef,mx,bw,sb,color);
return s;}

function singleStaffSVG(measures,clef,color){
  const PT=22,PB=20,staffTop=PT,staffBot=staffTop+4*SS,svgH=staffBot+PB;
  const CLEF_W=58,MW=152,w=CLEF_W+measures.length*MW+8;
  let svg=`<svg width="${w}" height="${svgH}" style="display:block">`;
  svg+=staveLines(2,staffTop,w-4);
  if(clef==='bass')svg+=`<text x="6" y="${staffTop+SS*3+5}" font-size="36" fill="#333" font-family="serif">𝄢</text>`;
  else svg+=`<text x="4" y="${staffTop+SS*5+8}" font-size="56" fill="#333" font-family="serif">𝄞</text>`;
  svg+=`<text x="46" y="${staffTop+SS*2+2}" font-size="13" fill="#333" font-family="serif">4</text><text x="46" y="${staffTop+SS*4+2}" font-size="13" fill="#333" font-family="serif">4</text>`;
  svg+=sLine(CLEF_W-3,staffTop,CLEF_W-3,staffBot,'#333',1.2);
  let x=CLEF_W;
  for(const meas of measures){
    if(meas.chord)svg+=`<text x="${x+MW/2}" y="${staffTop-6}" font-size="10" fill="#7c3aed" text-anchor="middle" font-family="monospace">${meas.chord}</text>`;
    svg+=renderNotes(meas.notes||[],clef,x+6,MW-12,staffBot,color);
    svg+=sLine(x+MW,staffTop,x+MW,staffBot,'#555',0.8);x+=MW;
  }
  svg+=sLine(x-MW+MW,staffTop,x-MW+MW,staffBot,'#333',1.8);svg+='</svg>';return svg;
}
function grandStaffSVG(measures,color){
  const PT=20,IGAP=18,PB=20,RHtop=PT,RHbot=RHtop+4*SS,LHtop=RHbot+IGAP,LHbot=LHtop+4*SS,svgH=LHbot+PB;
  const CLEF_W=64,MW=164,w=CLEF_W+measures.length*MW+8;
  let svg=`<svg width="${w}" height="${svgH}" style="display:block">`;
  svg+=`<path d="M 7,${RHtop} q -16,${(LHbot-RHtop)/2} 0,${LHbot-RHtop}" stroke="#333" fill="none" stroke-width="3"/>`;
  svg+=staveLines(12,RHtop,w-16);svg+=staveLines(12,LHtop,w-16);
  svg+=sLine(12,RHtop,12,LHbot,'#333',1.5);
  svg+=`<text x="15" y="${RHtop+SS*5+8}" font-size="52" fill="#333" font-family="serif">𝄞</text>`;
  svg+=`<text x="15" y="${LHtop+SS*3+5}" font-size="34" fill="#333" font-family="serif">𝄢</text>`;
  [RHtop,LHtop].forEach(t=>{svg+=`<text x="48" y="${t+SS*2+2}" font-size="13" fill="#333" font-family="serif">4</text><text x="48" y="${t+SS*4+2}" font-size="13" fill="#333" font-family="serif">4</text>`;});
  svg+=sLine(CLEF_W-3,RHtop,CLEF_W-3,LHbot,'#333',1.2);
  let x=CLEF_W;
  for(const meas of measures){
    if(meas.chord)svg+=`<text x="${x+MW/2}" y="${RHtop-5}" font-size="10" fill="#7c3aed" text-anchor="middle" font-family="monospace">${meas.chord}</text>`;
    const rh=(meas.rh||meas.notes||[]).filter(n=>!n.pitch||(()=>{const m=n.pitch.match(/^([A-G])(#|b)?(\d)$/);return m&&(parseInt(m[3])>4||(parseInt(m[3])===4));})());
    const lh=(meas.lh||meas.notes||[]).filter(n=>!n.pitch||(()=>{const m=n.pitch.match(/^([A-G])(#|b)?(\d)$/);return m&&parseInt(m[3])<=3;})());
    svg+=renderNotes(rh,'treble',x+6,MW-12,RHbot,color);
    svg+=renderNotes(lh,'bass',x+6,MW-12,LHbot,color);
    svg+=sLine(x+MW,RHtop,x+MW,LHbot,'#555',0.8);x+=MW;
  }
  svg+=sLine(x,RHtop,x,LHbot,'#333',2);svg+='</svg>';return svg;
}
function drumStaffSVG(measures){
  const PT=18,PB=18,MW=164,CLEF_W=42,staffTop=PT,staffBot=staffTop+4*SS,svgH=staffBot+PB;
  const w=CLEF_W+measures.length*MW+8;
  let svg=`<svg width="${w}" height="${svgH}" style="display:block">`;
  svg+=staveLines(2,staffTop,w-4);
  svg+=`<rect x="8" y="${staffTop+SS}" width="4" height="${SS*2}" fill="#555" rx="1"/><rect x="14" y="${staffTop+SS}" width="4" height="${SS*2}" fill="#555" rx="1"/>`;
  svg+=sLine(CLEF_W-3,staffTop,CLEF_W-3,staffBot,'#333',1.2);
  const DPOS={HH:8,CY:10,SD:4,BD:0};const DC={HH:'#e8a020',CY:'#50c878',SD:'#9060e8',BD:'#3b82f6'};
  let x=CLEF_W;
  for(const meas of measures){
    if(meas.chord)svg+=`<text x="${x+MW/2}" y="${staffTop-5}" font-size="10" fill="#7c3aed" text-anchor="middle" font-family="monospace">${meas.chord}</text>`;
    const pat=meas.pattern||{};const bw=(MW-12)/8;
    Object.entries(pat).forEach(([drum,row])=>{const pos=DPOS[drum]??4;const dc=DC[drum]||'#333';const y=pY(pos,staffBot);(row||[]).forEach((on,bi)=>{if(!on)return;const cx=x+6+bi*bw+bw/2;svg+=sLine(cx-4,y-4,cx+4,y+4,dc,1.8)+sLine(cx+4,y-4,cx-4,y+4,dc,1.8);});});
    svg+=sLine(x+MW,staffTop,x+MW,staffBot,'#555',0.8);x+=MW;
  }
  svg+=sLine(x,staffTop,x,staffBot,'#333',2);svg+='</svg>';return svg;
}
// Melody staff SVG (treble, interactive notes highlighted)
function melodyStaffSVG(measures,color='#1eb8a0'){
  return singleStaffSVG(measures.map(m=>({...m,notes:m.melNotes||[]})),'treble',color);
}

/* ─── DATA ─── */
function mkSong(t='新しい曲'){return{id:gid(),title:t,status:'アイデア',key:'C',tempo:120,lyrics:'',memo:'',sections:DSECS.map(n=>({id:gid(),name:n,lyrics:'',measures:Array(4).fill(0).map(()=>({id:gid(),chord:'',melNotes:[]}))})),selInstrs:['piano','bass','drums'],accomp:null,createdAt:Date.now(),updatedAt:Date.now()};}
let songs=[],curId=null,curTab='lyrics',aiHist=[],sbVis=window.innerWidth>768,pickerOpen=null;
function save(){try{localStorage.setItem('kch_v4',JSON.stringify({songs,curId}));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('kch_v4')||'{}');songs=d.songs||[];curId=d.curId||null;}catch(e){songs=[];curId=null;}}
function cur(){return songs.find(s=>s.id===curId);}
// ★ saveOnly: DOM再描画なしで保存するだけ
function saveOnly(fn){const s=cur();if(!s)return;fn(s);s.updatedAt=Date.now();save();}
function upd(fn){const s=cur();if(!s)return;fn(s);s.updatedAt=Date.now();save();renderSongList();renderTab();}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}

/* ─── SONGS ─── */
function addSong(){const s=mkSong();songs.unshift(s);curId=s.id;curTab='lyrics';aiHist=[];save();renderAll();}
function delSong(id,e){e.stopPropagation();songs=songs.filter(s=>s.id!==id);if(curId===id)curId=songs[0]?.id||null;save();renderAll();}
function selSong(id){curId=id;curTab='lyrics';aiHist=[];save();closeSB();renderAll();}
function onTitleChange(v){const s=cur();if(!s)return;s.title=v;s.updatedAt=Date.now();save();renderSongList();}
function toggleSB(){
  const isMobile=window.innerWidth<=768;
  if(isMobile){
    const sb=document.getElementById('sidebar');
    const ov=document.getElementById('sb-overlay');
    const isOpen=sb.classList.contains('open');
    sb.classList.toggle('open',!isOpen);
    ov.classList.toggle('open',!isOpen);
  } else {
    sbVis=!sbVis;
    document.getElementById('sidebar').style.display=sbVis?'flex':'none';
  }
}
function closeSB(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('open');
}

/* ─── STATUS ─── */
function initSDrop(){document.getElementById('stDrop').innerHTML=STATS.map(s=>`<div class="sopt" style="color:${STC[s]}" onclick="setStatus('${s}')">${s}</div>`).join('');}
function toggleSDrop(){document.getElementById('stDrop').classList.toggle('open');}
function setStatus(s){upd(song=>song.status=s);document.getElementById('stDrop').classList.remove('open');renderStatusBtn();}
function renderStatusBtn(){const s=cur();if(!s)return;const b=document.getElementById('stBtn');b.textContent=s.status;b.style.background=STC[s.status]+'22';b.style.borderColor=STC[s.status]+'66';b.style.color=STC[s.status];}

/* ─── RENDER ─── */
const TABS=[{id:'lyrics',l:'歌詞'},{id:'melody',l:'メロディ'},{id:'chords',l:'コード'},{id:'accomp',l:'伴奏譜面'},{id:'score',l:'チャート'},{id:'ai',l:'AI相談'}];
function renderAll(){
  renderSongList();const s=cur();
  ['topbar','tabsBar','tabC','bnav'].forEach(id=>document.getElementById(id).style.display='');
  document.getElementById('emptyS').style.display='none';
  if(!s){['topbar','tabsBar','tabC','bnav'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById('emptyS').style.display='flex';return;}
  document.getElementById('titleIn').value=s.title;renderStatusBtn();renderTabsBar();renderTab();renderBNav();
}
function renderSongList(){
  const el=document.getElementById('songList');
  if(!songs.length){el.innerHTML='<p style="color:var(--text3);font-size:11px;text-align:center;margin-top:18px;font-family:var(--mono)">— empty —</p>';return;}
  el.innerHTML=[...songs].sort((a,b)=>b.updatedAt-a.updatedAt).map(s=>`<div class="si${s.id===curId?' active':''}" onclick="selSong('${s.id}')"><div class="sn">${esc(s.title)}</div><span class="stag" style="background:${STC[s.status]}18;color:${STC[s.status]}">${s.status}</span><button class="sdel" onclick="delSong('${s.id}',event)">×</button></div>`).join('');
}
function renderTabsBar(){document.getElementById('tabsBar').innerHTML=TABS.map(t=>`<button class="tbtn${t.id===curTab?' active':''}" onclick="switchTab('${t.id}')">${t.l}</button>`).join('');}
function renderBNav(){document.querySelectorAll('.bnb').forEach(b=>b.classList.toggle('active',b.dataset.tab===curTab));}
function switchTab(t){curTab=t;closeNotePicker();renderTabsBar();renderBNav();renderTab();}
function renderTab(){
  const s=cur();if(!s)return;const el=document.getElementById('tabC');
  el.className='tab-c fi';void el.offsetWidth;
  if(curTab==='lyrics')el.innerHTML=renderLyrics(s);
  else if(curTab==='melody')el.innerHTML=renderMelody(s);
  else if(curTab==='chords')el.innerHTML=renderChords(s);
  else if(curTab==='accomp')el.innerHTML=renderAccomp(s);
  else if(curTab==='score')el.innerHTML=renderScore(s);
  else if(curTab==='ai'){el.innerHTML=renderAI(s);const m=document.getElementById('chatMsgs');if(m)m.scrollTop=m.scrollHeight;}
}

/* ─── LYRICS ─ テキストエリアはoninputでsaveOnlyを使い、再描画しない ─── */
function renderLyrics(s){return`
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
  <div><label class="flbl">KEY</label><select class="inp" onchange="upd(s=>s.key=this.value)">${KEYS.map(k=>`<option${k===s.key?' selected':''}>${k}</option>`).join('')}</select></div>
  <div><label class="flbl">BPM</label><input type="number" class="inp" style="width:72px" value="${s.tempo}" min="40" max="300" onchange="upd(s=>s.tempo=parseInt(this.value)||120)"></div>
</div>
<div style="font-family:var(--disp);font-size:15px;font-weight:700;margin-bottom:10px">セクション別 歌詞</div>
${s.sections.map((sec,si)=>`

function previewNote(pitch){playNote(pitch);}
function delMelNote(si,mi,ni){upd(s=>{s.sections[si].measures[mi].melNotes.splice(ni,1);let sb=0;for(const n of s.sections[si].measures[mi].melNotes){n.startBeat=sb;sb+=(DB[n.duration]||1);}});}

/* ── Note Picker ── */
let npState={pitch:'C4',dur:'q'};
let npTarget={si:-1,mi:-1};
function openNotePicker(e,si,mi){
  e.stopPropagation();
  npTarget={si,mi};
  const btn=e.currentTarget;const rect=btn.getBoundingClientRect();
  const npk=document.getElementById('npk');
  npk.style.display='block';
  const isMobile=window.innerWidth<=768;
  if(isMobile){
    npk.style.left='8px';npk.style.right='8px';npk.style.bottom=(parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav'))||62)+8+'px';
    npk.style.top='auto';npk.style.width='auto';npk.style.maxWidth='none';
  }else{
    const top=Math.min(rect.bottom+6,window.innerHeight-320);
    const left=Math.min(rect.left,window.innerWidth-290);
    npk.style.top=Math.max(8,top)+'px';npk.style.left=Math.max(8,left)+'px';
    npk.style.bottom='auto';npk.style.right='auto';npk.style.width='280px';
  }
  renderNotePicker();
}
function renderNotePicker(){
  const s=cur();
  const scaleNotes=s?getScaleNotes(s.key):NN;
  const npk=document.getElementById('npk');
  npk.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
  <span style="font-size:11px;font-weight:700;color:var(--teal);font-family:var(--mono)">タップで即追加</span>
  <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px" onclick="closeNotePicker()">✕</button>
</div>
<div class="npk-row">
  <span class="npk-lbl">octave</span>
  <div style="display:flex;gap:3px">${OCTAVES.map(o=>`<button class="npk-note${npState.pitch.slice(-1)==String(o)?' sel':''}" onclick="npSetOct(${o})">${o}</button>`).join('')}</div>
</div>
<div class="npk-row">
  <span class="npk-lbl">音価</span>
  <div class="dur-row">${DURS.map(d=>`<button class="dur-btn${npState.dur===d.v?' sel':''}" onclick="npSetDur('${d.v}')">${d.l}</button>`).join('')}</div>
</div>
<div class="npk-row">
  <span class="npk-lbl">音名</span>
  <div style="display:flex;gap:3px;flex-wrap:wrap">${NOTE_NAMES_JP.map(n=>{const isScale=scaleNotes.includes(n);const cls='npk-note'+(n.includes('#')?' sharp':'')+(isScale?' scale':'');return'<button class="'+cls+'" onclick="npTap(\''+n+'\')">'+n+'</button>';}).join('')}
  <button class="npk-note" style="color:var(--coral);border-color:rgba(224,80,80,.4)" onclick="npTap('R')">休</button>
  </div>
</div>
<div style="margin-top:8px;font-size:10px;color:var(--text3);font-family:var(--mono)">
  <span style="color:var(--teal)">●</span> Key: ${s?.key||'C'} スケール音
</div>`;
}
function npSetOct(o){const root=npState.pitch.replace(/\d/,'');npState.pitch=root+o;renderNotePicker();}
function npSetDur(d){npState.dur=d;renderNotePicker();}
function npTap(n){
  if(n==='R'){addMelNoteQuick(npTarget.si,npTarget.mi,'R',npState.dur);return;}
  const oct=npState.pitch.slice(-1);npState.pitch=n+oct;
  playNote(npState.pitch);
  addMelNoteQuick(npTarget.si,npTarget.mi,npState.pitch,npState.dur);
}
function closeNotePicker(){document.getElementById('npk').style.display='none';}
function addMelNote(si,mi,pitch,dur){upd(s=>{if(!s.sections[si].measures[mi].melNotes)s.sections[si].measures[mi].melNotes=[];let sb=0;for(const n of s.sections[si].measures[mi].melNotes){sb+=(DB[n.duration]||1);}s.sections[si].measures[mi].melNotes.push({pitch,duration:dur,startBeat:sb});});}
function addMelNoteQuick(si,mi,pitch,dur){
  const s=cur();if(!s)return;
  if(!s.sections[si].measures[mi].melNotes)s.sections[si].measures[mi].melNotes=[];
  let sb=0;for(const n of s.sections[si].measures[mi].melNotes){sb+=(DB[n.duration]||1);}
  if(sb>=4){toast('この小節はいっぱいです');return;}
  s.sections[si].measures[mi].melNotes.push({pitch,duration:dur,startBeat:sb});
  s.updatedAt=Date.now();save();renderSongList();
  const tabC=document.getElementById('tabC');const scrollY=tabC.scrollTop;
  renderTab();tabC.scrollTop=scrollY;
}

function closeAllPickers(){document.querySelectorAll('.cpk').forEach(el=>el.remove());}
function addSection(){upd(s=>s.sections.push({id:gid(),name:'新セクション',lyrics:'',measures:Array(4).fill(0).map(()=>({id:gid(),chord:'',melNotes:[]}))}));}
function delSection(si){upd(s=>{if(s.sections.length>1)s.sections.splice(si,1);});}
function addMeasure(si){upd(s=>s.sections[si].measures.push({id:gid(),chord:'',melNotes:[]}));}
function delMeasure(si,mi){upd(s=>{if(s.sections[si].measures.length>1)s.sections[si].measures.splice(mi,1);});closeAllPickers();}
function applyProg(si,cs){upd(s=>{s.sections[si].measures=cs.map((c,i)=>({...s.sections[si].measures[i],id:s.sections[si].measures[i]?.id||gid(),chord:c,melNotes:s.sections[si].measures[i]?.melNotes||[]}));});}

function renderAccomp(s){
  const ac=s.accomp;
  return`
<div style="margin-bottom:12px"><label class="flbl">楽器を選択</label>
<div class="isel">${Object.entries(INSTRS).map(([k,v])=>{const on=(s.selInstrs||[]).includes(k);return`<button class="ibtn" style="border-color:${on?v.color:v.color+'33'};color:${on?v.color:'var(--text3)'};background:${on?v.color+'18':'transparent'}" onclick="toggleInstr('${k}')">${v.label}</button>`;}).join('')}</div></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px">
  <button class="btn btn-a" id="genBtn" onclick="generateAccomp()">✦ 伴奏を生成</button>

</div>
${!ac?`<div style="text-align:center;padding:44px 20px"><div style="font-size:36px;margin-bottom:12px;opacity:.3">🎼</div><div style="color:var(--text3);font-size:12px;line-height:2;font-family:var(--mono)">楽器を選んで、伴奏を生成。<br><span style="font-size:10px">コードタブでコード進行を入れておくと精度UP</span></div></div>`
:Object.entries(INSTRS).filter(([k])=>ac[k]).map(([k,v])=>`<div style="margin-bottom:20px"><div class="staff-part-lbl" style="color:${v.color}">▸ ${v.label}</div>${ac[k].sections?.map(sec=>`<div style="margin-bottom:12px"><div class="staff-sec-lbl">${sec.sectionName||sec.name||'SEC'}</div><div class="staff-block">${k==='piano'?grandStaffSVG(sec.measures,v.color):k==='drums'?drumStaffSVG(sec.measures):singleStaffSVG(sec.measures,k==='bass'?'bass':'treble',v.color)}</div></div>`).join('')}</div>`).join('')}`;}

function toggleInstr(k){upd(s=>{const i=(s.selInstrs||[]).indexOf(k);if(i>=0)s.selInstrs.splice(i,1);else s.selInstrs.push(k);});}

async function generateAccomp(){
  const s=cur();if(!s)return;const btn=document.getElementById('genBtn');btn.textContent='生成中...';btn.disabled=true;
  const cp=s.sections.map(x=>`${x.name}:${x.measures.map(m=>m.chord||'–').join('|')}`).join('\n');
  const instrs=s.selInstrs||['piano','bass','drums'];
  const sys=`音楽アレンジャー。コード進行に合わせたJ-POP系伴奏をJSONのみで返す。説明・コードブロック不要。
フォーマット(選択楽器のみ):
{"piano":{"sections":[{"sectionName":"Aメロ","measures":[{"chord":"C","rh":[{"pitch":"E4","startBeat":0,"duration":"h"},{"pitch":"G4","startBeat":2,"duration":"h"}],"lh":[{"pitch":"C3","startBeat":0,"duration":"q"},{"pitch":"G3","startBeat":1,"duration":"q"},{"pitch":"C3","startBeat":2,"duration":"q"},{"pitch":"G3","startBeat":3,"duration":"q"}]}]}]},
"bass":{"sections":[{"sectionName":"Aメロ","measures":[{"chord":"C","notes":[{"pitch":"C2","startBeat":0,"duration":"h"},{"pitch":"G2","startBeat":2,"duration":"q"},{"pitch":"E2","startBeat":3,"duration":"q"}]}]}]},
"guitar":{"sections":[{"sectionName":"Aメロ","measures":[{"chord":"C","notes":[{"pitch":"E3","startBeat":0,"duration":"q"},{"pitch":"G3","startBeat":1,"duration":"q"},{"pitch":"B3","startBeat":2,"duration":"q"},{"pitch":"G3","startBeat":3,"duration":"q"}]}]}]},
"drums":{"sections":[{"sectionName":"Aメロ","measures":[{"chord":"C","pattern":{"HH":[1,1,1,1,1,1,1,1],"SD":[0,0,0,0,1,0,0,0],"BD":[1,0,0,0,1,0,0,0],"CY":[1,0,0,0,0,0,0,0]}}]}]}}
ルール:piano rh=C4以上,lh=C3以下。bass=C1-C3,guitar=E2-E5。startBeat=0〜3,duration=w/h/q/8/16。各小節合計4拍。drums=8拍8要素 0/1。各セクション2小節。楽器:${instrs.join(',')}`;
  try{
    const raw=await callGemini(sys,[{role:'user',content:`${s.title} Key:${s.key} BPM:${s.tempo}\n${cp}`}],1200);
    const t=raw.replace(/```json|```/g,'').trim();
    const p=JSON.parse(t);upd(song=>{song.accomp=p;});toast('🎼 伴奏譜面を生成しました！');
  }catch(e){
    console.error(e);
    if(e.message==='NO_KEY'){openSettings();}
    else{alert('生成失敗。コード進行を入力してから再試行してください。');}
  }
  if(btn){btn.textContent='✦ 伴奏を生成';btn.disabled=false;}
}

function exportMusicXML(){
  const s=cur();if(!s?.accomp)return;
  const dm={w:16,h:8,q:4,'8':2,'16':1},tm={w:'whole',h:'half',q:'quarter','8':'eighth','16':'16th'};
  const ac=s.accomp;const partDefs=[];
  if(ac.piano){partDefs.push({id:'P1',name:'ピアノ右手',instr:'piano',clef:'treble',hand:'rh'});partDefs.push({id:'P2',name:'ピアノ左手',instr:'piano',clef:'bass',hand:'lh'});}
  if(ac.bass)partDefs.push({id:`P${partDefs.length+1}`,name:'ベース',instr:'bass',clef:'bass',hand:null});
  if(ac.guitar)partDefs.push({id:`P${partDefs.length+1}`,name:'ギター',instr:'guitar',clef:'treble',hand:null});
  const pl=partDefs.map(p=>`<score-part id="${p.id}"><part-name>${p.name}</part-name></score-part>`).join('');
  const parts=partDefs.map(p=>{let mn=1;const data=ac[p.instr];if(!data)return'';const cl=p.clef==='bass'?'bass':'treble';
    const ms=data.sections?.flatMap(sec=>(sec.measures||[]).map(meas=>{
      const src=p.hand==='rh'?meas.rh||[]:p.hand==='lh'?meas.lh||[]:meas.notes||[];
      let notes=src.filter(n=>n.pitch&&n.pitch!=='R').map(n=>{const m=n.pitch.match(/^([A-G])(#|b)?(\d)$/);if(!m)return null;return{step:m[1],alter:m[2]==='#'?1:m[2]==='b'?-1:null,oct:m[3],dur:n.duration||'q',type:tm[n.duration||'q']||'quarter'};}).filter(Boolean);
      if(!notes.length)notes=[{rest:true,dur:'w',type:'whole'}];
      const nx=notes.map(n=>n.rest?`<note><rest/><duration>16</duration><type>whole</type></note>`:`<note><pitch><step>${n.step}</step>${n.alter!=null?`<alter>${n.alter}</alter>`:''}<octave>${n.oct}</octave></pitch><duration>${dm[n.dur]||4}</duration><type>${n.type}</type></note>`).join('');
      const attr=mn===1?`<attributes><divisions>4</divisions><key><fifths>0</fifths></key><time><beats>4</beats><beat-type>4</beat-type></time><clef><sign>${cl==='bass'?'F':'G'}</sign><line>${cl==='bass'?4:2}</line></clef></attributes>`:'';
      return`<measure number="${mn++}">${attr}${nx}</measure>`;
    }))||[];
    return`<part id="${p.id}">${ms.join('')}</part>`;
  }).join('');
  const xml=`<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 3.1 Partwise//EN" "http://www.musicxml.org/dtds/partwise.dtd"><score-partwise version="3.1"><work><work-title>${esc(s.title)}</work-title></work><part-list>${pl}</part-list>${parts}</score-partwise>`;
  const blob=new Blob([xml],{type:'application/xml'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`${s.title}.musicxml`;a.click();URL.revokeObjectURL(url);
  toast('✓ MusicXMLをダウンロード。LogicProで開いてください');
}

/* ─── GEMINI API ─── */
const GEMINI_KEY_ST='songbook_gemini_key';
function getGeminiKey(){return localStorage.getItem(GEMINI_KEY_ST)||'';}
function setGeminiKey(k){localStorage.setItem(GEMINI_KEY_ST,k);}

const GEMINI_MODELS=['gemini-2.5-flash','gemini-2.0-flash','gemini-1.5-flash'];
async function callGemini(systemText,messages,maxTokens=800){
  const key=getGeminiKey();
  if(!key)throw new Error('NO_KEY');
  const body={
    system_instruction:{parts:[{text:systemText}]},
    contents:messages.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]})),
    generationConfig:{maxOutputTokens:maxTokens}
  };
  for(const model of GEMINI_MODELS){
    const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.error&&(d.error.code===404||d.error.message?.includes('not found'))){continue;}
    if(d.error)throw new Error(d.error.message);
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }
  throw new Error('利用可能なGeminiモデルが見つかりません');
}

/* ─── AI ─── */
function renderAI(s){
  const hasKey=!!getGeminiKey();
  const SUGG=['Aメロのコード提案して','サビをドラマチックにして','黄昏コード教えて','伴奏アレンジのアドバイス'];
  return`<div class="chat-wr" style="height:calc(100vh - 175px)">
${!hasKey?`<div style="background:rgba(232,160,32,.08);border:1px solid rgba(232,160,32,.3);border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:var(--amber)">

</div>`:''}
<div class="chat-msgs" id="chatMsgs">${aiHist.length===0?`<div class="mb mb-a">「${esc(s.title)}」の制作サポートします！コード・アレンジ・歌詞など何でもどうぞ 🎵</div>`:''} ${aiHist.map(m=>`<div class="mb ${m.role==='user'?'mb-u':'mb-a'}">${m.content.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>`).join('')}<div id="chatBottom"></div></div>

  <div class="chat-row"><input id="chatIn" class="chat-in" placeholder="コード、アレンジ、メロディなど..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI();}"><button class="btn btn-a" onclick="sendAI()">送信</button></div>
</div></div>`;}

async function sendAI(text){
  const s=cur();if(!s)return;
  if(!getGeminiKey()){openSettings();return;}
  const inp=document.getElementById('chatIn');const t=(text||inp?.value||'').trim();if(!t)return;if(inp)inp.value='';
  aiHist.push({role:'user',content:t});renderTab();
  setTimeout(()=>document.getElementById('chatBottom')?.scrollIntoView({behavior:'smooth'}),50);
  const cp=s.sections.map(x=>`${x.name}:${x.measures.map(m=>m.chord||'–').join('|')}`).join('\n');
  const sys=`J-POP音楽制作アドバイザー。「${s.title}」制作中(${s.status})。Key:${s.key} BPM:${s.tempo}\nコード:\n${cp}\n歌詞:${s.lyrics||'未入力'}\n短く答えて。コード提案はC→Am→F→G形式で。`;
  try{
    const text=await callGemini(sys,aiHist,800);
    aiHist.push({role:'assistant',content:text});
  }catch(e){
    if(e.message==='NO_KEY'){openSettings();return;}
    aiHist.push({role:'assistant',content:`⚠️ エラー: ${e.message}`});
  }
  renderTab();setTimeout(()=>document.getElementById('chatBottom')?.scrollIntoView({behavior:'smooth'}),100);
}

/* ─── GOOGLE DRIVE SYNC ─── */
const CLIENT_ID_ST='songbook_oauth_cid';
const DRIVE_FID_ST='songbook_drive_fid';
function getClientId(){return localStorage.getItem(CLIENT_ID_ST)||'';}
function setClientId(v){localStorage.setItem(CLIENT_ID_ST,v);}

let tokenClient=null,accessToken=null,tokenExpiry=0;
let driveFileId=localStorage.getItem(DRIVE_FID_ST)||null;
let driveReady=false,driveSyncing=false,driveSaveTimer=null;

function setSyncStatus(msg){
  const el=document.getElementById('syncStatus');
  if(!el)return;el.textContent=msg;el.style.opacity=1;
  if(msg.startsWith('✓'))setTimeout(()=>{el.style.opacity=.4;},3000);
}

function initGIS(){
  const cid=getClientId();
  if(!cid||typeof google==='undefined')return;
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:cid,
    scope:'https://www.googleapis.com/auth/drive.appdata',
    callback:async(resp)=>{
      if(resp.error){setSyncStatus('⚠ 認証失敗');return;}
      accessToken=resp.access_token;
      tokenExpiry=Date.now()+(resp.expires_in-60)*1000;
      driveReady=true;renderSyncBar();
      setSyncStatus('読み込み中...');
      const ok=await driveLoad();
      if(ok){renderAll();}
      setSyncStatus('✓ Drive同期済み');
    }
  });
}

async function signInDrive(){
  if(!getClientId()){openSettings();return;}
  if(!tokenClient){
    // GISがまだロードされていない場合は少し待つ
    if(typeof google==='undefined'){toast('Google SDKを読み込み中...');setTimeout(()=>{initGIS();signInDrive();},1000);return;}
    initGIS();
  }
  tokenClient.requestAccessToken({prompt:driveReady?'':'consent'});
}

async function ensureToken(){
  if(accessToken&&Date.now()<tokenExpiry)return true;
  if(!tokenClient)return false;
  return new Promise(resolve=>{
    const orig=tokenClient.callback;
    tokenClient.callback=(resp)=>{
      tokenClient.callback=orig;
      if(!resp.error){accessToken=resp.access_token;tokenExpiry=Date.now()+(resp.expires_in-60)*1000;resolve(true);}
      else resolve(false);
    };
    tokenClient.requestAccessToken({prompt:''});
  });
}

async function driveLoad(){
  if(!await ensureToken())return false;
  try{
    if(!driveFileId){
      const r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='songbook_data.json'",
        {headers:{Authorization:`Bearer ${accessToken}`}});
      const d=await r.json();
      if(d.files?.length>0){driveFileId=d.files[0].id;localStorage.setItem(DRIVE_FID_ST,driveFileId);}
    }
    if(!driveFileId)return false;
    const r=await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
      {headers:{Authorization:`Bearer ${accessToken}`}});
    const d=await r.json();
    if(Array.isArray(d.songs)){
      songs=d.songs;
      if(!curId||!songs.find(s=>s.id===curId))curId=songs[0]?.id||null;
      _origSave();return true;
    }
  }catch(e){console.error('Drive load error',e);}
  return false;
}

async function driveSaveNow(){
  if(!driveReady||!await ensureToken())return;
  if(driveSyncing){driveSaveTimer=setTimeout(driveSaveNow,1500);return;}
  driveSyncing=true;setSyncStatus('保存中...');
  const content=JSON.stringify({songs,curId});
  try{
    if(driveFileId){
      const r=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,
        {method:'PATCH',headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},body:content});
      if(r.status===404){driveFileId=null;localStorage.removeItem(DRIVE_FID_ST);}
    }
    if(!driveFileId){
      const meta={name:'songbook_data.json',parents:['appDataFolder']};
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
      form.append('file',new Blob([content],{type:'application/json'}));
      const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
        {method:'POST',headers:{Authorization:`Bearer ${accessToken}`},body:form});
      const d=await r.json();
      if(d.id){driveFileId=d.id;localStorage.setItem(DRIVE_FID_ST,driveFileId);}
    }
    setSyncStatus('✓ Drive同期済み');
  }catch(e){setSyncStatus('⚠ 保存失敗');}
  driveSyncing=false;
}

// saveをオーバーライド：ローカル保存後、Driveに1秒debounceで同期
const _origSave=save;
function save(){
  _origSave();
  if(driveReady){clearTimeout(driveSaveTimer);driveSaveTimer=setTimeout(driveSaveNow,1000);}
}
